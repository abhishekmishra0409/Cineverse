<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./logoicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineVerse</title>
    <script>
        // Restore route after GitHub Pages 404 redirect for SPA deep links.
        (function () {
            const search = window.location.search;
            if (!search.startsWith("?/")) return;

            const raw = search.slice(2);
            const [rawPath, ...rawQueryParts] = raw.split("&");
            const normalizedPath = rawPath.split("/").filter(Boolean).join("/");
            const decodedQuery = rawQueryParts.join("&").replace(/~and~/g, "&");
            const basePath = window.location.pathname.replace(/\/+$/, "");

            let url = `${basePath}/${normalizedPath}`;
            if (!normalizedPath) {
                url = `${basePath}/`;
            }
            if (decodedQuery) {
                url += `?${decodedQuery}`;
            }
            if (window.location.hash) {
                url += window.location.hash;
            }
            window.history.replaceState(null, null, url);
        })();
    </script>
</head>

<body>
    <div class="bg-white dark:bg-gray-800" id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
