<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>CineVerse</title>
    <script>
        // Redirect unknown routes back to the SPA entry on GitHub Pages.
        (function () {
            var l = window.location;
            var parts = l.pathname.split('/').filter(Boolean);
            var repoBase = parts.length ? '/' + parts[0] : '';
            var appPath = parts.slice(1).join('/');
            var query = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';
            var target = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + repoBase + '/?/' + appPath.replace(/&/g, '~and~') + query + l.hash;
            l.replace(target);
        })();
    </script>
</head>

<body></body>

</html>
